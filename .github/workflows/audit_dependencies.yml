name: Dependency Audit

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]
  schedule:
    - cron: "0 0 * * 1" # Weekly on Mondays

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]
      - name: Run pip-audit
        run: |
          # CVE ignores rationale:
          #  CVE-2026-4539: transitive dependency, no exploit path in CLI context
          #  CVE-2025-8869: low severity, no impact on hardware enumeration
          #  CVE-2026-1703: affects server-side only, lshw is read-only client
          #  CVE-2026-24049: disputed CVE, not applicable to our dependency usage
          pip-audit \
            --ignore-vuln CVE-2026-4539 \
            --ignore-vuln CVE-2025-8869 \
            --ignore-vuln CVE-2026-1703 \
            --ignore-vuln CVE-2026-24049
